services:
  # Frontend Service (Static Site)
  - type: web
    name: contribution-atelier-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: contribution-atelier-backend
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Backend Service (Django API)
  - type: web
    name: contribution-atelier-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: daphne config.asgi:application --port $PORT --bind 0.0.0.0
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: contribution-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: live-notifications-redis
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: contribution-db
    plan: free

# Redis for future live notifications (Issue #20)
redis:
  - name: live-notifications-redis
    plan: free
    ipAllowList: [] # Only allow internal connections
